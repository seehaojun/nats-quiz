<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nat's Quiz - P4</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/dark.css">
</head>
<body>
<div class="app">

<!-- Dashboard / Home -->
<div class="screen" id="dashboardScreen" style="position:relative">
  <button class="theme-toggle" id="themeToggle" onclick="QuizApp.toggleDarkMode()" title="Toggle dark mode">&#9790;</button>
  <h1>Nat's Quiz</h1>
  <div class="dashboard-stats" id="dashStats"></div>
  <div class="daily-progress" id="dailyProgress"></div>
  <div class="dashboard-actions" id="dashboardActions"></div>
  <h2 class="section-title">Choose a Subject</h2>
  <div class="subject-grid" id="subjectGrid"></div>
  <div class="badges-section" id="badgesSection"></div>
</div>

<!-- Theme Selection -->
<div class="screen" id="themeScreen" style="display:none">
  <button class="back-btn" onclick="QuizApp.goDashboard()">&larr; All Subjects</button>
  <h1 id="themeScreenTitle">Science</h1>
  <p id="themeScreenDesc">Pick a theme to start</p>
  <div class="theme-grid" id="themeGrid"></div>
</div>

<!-- Topic Selection -->
<div class="screen" id="homeScreen" style="display:none">
  <button class="back-btn" onclick="QuizApp.goThemes()">&larr; All Themes</button>
  <h1 id="homeTitle">Diversity</h1>
  <p id="homeSubtitle">Pick a topic</p>
  <div id="topicButtons"></div>
</div>

<!-- Quiz -->
<div class="screen" id="quizScreen" style="display:none">
  <button class="back-btn" onclick="QuizApp.goHome()">&larr; Back</button>
  <div class="quiz-header">
    <h2 id="topicTitle"></h2>
    <div class="score-display" id="scoreDisplay">0 / 0</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="timer-text" id="timerText"></div>
  <div class="timer-bar" id="timerBar"><div class="timer-fill" id="timerFill"></div></div>
  <div class="hard-score-display" id="hardScoreDisplay"></div>
  <div class="question-card">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <ul class="options" id="optionsList"></ul>
    <div class="explanation" id="explanation"></div>
    <div class="time-bonus" id="timeBonus"></div>
  </div>
</div>

<!-- Results -->
<div class="screen" id="resultsScreen" style="display:none">
  <div class="results-card">
    <h2>Quiz Done!</h2>
    <div class="xp-gained" id="xpGained"></div>
    <div class="big-score"><span id="finalScore"></span></div>
    <div class="grade" id="gradeLabel"></div>
    <div class="new-badges" id="newBadges"></div>
    <div class="wrong-list" id="wrongList"></div>
  </div>
  <button class="restart-btn practice-wrong-btn" id="practiceWrongBtn" onclick="QuizApp.practiceWrongAnswers()" style="display:none">Practice Wrong Answers</button>
  <button class="restart-btn" onclick="QuizApp.startQuiz(window._lastTopic)">Try Again</button>
  <button class="restart-btn home-btn" onclick="QuizApp.goHome()">Pick Another Topic</button>
  <button class="restart-btn home-btn" onclick="QuizApp.goDashboard()">Home</button>
</div>

<!-- Progress Dashboard -->
<div class="screen" id="progressScreen" style="display:none">
  <button class="back-btn" onclick="QuizApp.goDashboard()">&larr; Back to Home</button>
  <h1>Progress</h1>
  <div id="progressOverall" class="progress-overall"></div>
  <div id="progressSubjects"></div>
</div>

<!-- Badge notification toast -->
<div class="badge-toast" id="badgeToast"></div>

</div>

<!-- Data files — Science -->
<script src="data/diversity.js"></script>
<script src="data/cycles.js"></script>
<script src="data/systems.js"></script>
<script src="data/energy.js"></script>
<script src="data/interactions.js"></script>
<script src="data/matter.js"></script>
<script src="data/magnets.js"></script>
<!-- Data files — English -->
<script src="data/grammar.js"></script>
<script src="data/vocabulary.js"></script>
<script src="data/comprehension.js"></script>
<script src="data/synthesis.js"></script>
<script src="data/editing.js"></script>
<script src="data/visualtext.js"></script>
<script src="data/vocabcloze.js"></script>
<!-- Data files — Math -->
<script src="data/wholenumbers.js"></script>
<script src="data/fractions.js"></script>
<script src="data/decimals.js"></script>
<script src="data/measurement.js"></script>
<script src="data/money.js"></script>
<script src="data/geometry.js"></script>
<script src="data/tables.js"></script>
<!-- Data files — Chinese -->
<script src="data/hanzi.js"></script>
<script src="data/yufa.js"></script>
<script src="data/cloze.js"></script>
<script src="data/yuedu.js"></script>
<script src="data/chengyu.js"></script>
<script src="data/sentence.js"></script>

<!-- Engine -->
<script src="js/storage.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/app.js"></script>
</body>
</html>
