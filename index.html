<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nat's Quiz - P4 Science</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

<!-- Theme Selection -->
<div class="theme-select" id="themeScreen">
  <h1>Nat's Quiz</h1>
  <p>P4 Science — Pick a theme to start</p>
  <div class="theme-grid" id="themeGrid"></div>
</div>

<!-- Topic Selection -->
<div class="home" id="homeScreen">
  <button class="back-btn" onclick="QuizApp.goThemes()">&larr; All Themes</button>
  <h1 id="homeTitle">P4 Science Quiz</h1>
  <p id="homeSubtitle">Pick a topic</p>
  <div id="topicButtons"></div>
</div>

<!-- Quiz -->
<div class="quiz" id="quizScreen">
  <button class="back-btn" onclick="QuizApp.goHome()">&larr; Back</button>
  <div class="quiz-header">
    <h2 id="topicTitle"></h2>
    <div class="score-display" id="scoreDisplay">0 / 0</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="timer-text" id="timerText"></div>
  <div class="timer-bar" id="timerBar"><div class="timer-fill" id="timerFill"></div></div>
  <div class="hard-score-display" id="hardScoreDisplay"></div>
  <div class="question-card">
    <div class="q-number" id="qNumber"></div>
    <div class="q-text" id="qText"></div>
    <ul class="options" id="optionsList"></ul>
    <div class="explanation" id="explanation"></div>
    <div class="time-bonus" id="timeBonus"></div>
  </div>
</div>

<!-- Results -->
<div class="results" id="resultsScreen">
  <div class="results-card">
    <h2>Quiz Done!</h2>
    <div class="big-score"><span id="finalScore"></span></div>
    <div class="grade" id="gradeLabel"></div>
    <div class="wrong-list" id="wrongList"></div>
  </div>
  <button class="restart-btn" onclick="QuizApp.startQuiz(window._lastTopic)">Try Again</button>
  <button class="restart-btn home-btn" onclick="QuizApp.goHome()">Pick Another Topic</button>
  <button class="restart-btn home-btn" onclick="QuizApp.goThemes()">All Themes</button>
</div>

</div>

<!-- Data -->
<script src="data/diversity.js"></script>

<!-- Engine -->
<script src="js/data-loader.js"></script>
<script src="js/app.js"></script>
</body>
</html>
